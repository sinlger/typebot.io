# 本地测试用 - 使用本地预构建镜像
# 用法: docker compose -f docker-compose.local.yml up -d

x-typebot-common: &typebot-common
  restart: always
  depends_on:
    typebot-redis:
      condition: service_healthy
    typebot-db:
      condition: service_healthy
  networks:
    - typebot-network
  env_file: .env
  environment:
    REDIS_URL: redis://typebot-redis:6379
    DATABASE_URL: postgresql://postgres:typebot@typebot-db:5432/typebot
    WORKFLOWS_DATABASE_URL: postgresql://postgres:typebot@typebot-db:5432/typebot
    WORKFLOWS_RPC_URL: http://typebot-workflows:3000/rpc

services:
  typebot-db:
    image: postgres:16
    restart: always
    volumes:
      - db-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=typebot
      - POSTGRES_PASSWORD=typebot
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - typebot-network

  typebot-redis:
    image: redis:alpine
    restart: always
    command: --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 3s
    volumes:
      - redis-data:/data
    networks:
      - typebot-network

  typebot-builder:
    <<: *typebot-common
    image: typebot-builder:local
    ports:
      - "8000:3000"

  typebot-viewer:
    <<: *typebot-common
    image: typebot-viewer:local
    ports:
      - "8001:3000"

  typebot-workflows:
    <<: *typebot-common
    image: typebot-workflows:local
    ports:
      - "8002:3000"

  typebot-landing-page:
    <<: *typebot-common
    image: typebot-landing-page:local
    ports:
      - "8003:3000"

networks:
  typebot-network:
    driver: bridge

volumes:
  db-data:
  redis-data:
